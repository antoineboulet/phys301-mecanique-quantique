project:
  type: book
  output-dir: ../_site/notes

lang: fr

book:
  title: "Mécanique Quantique"
  subtitle: "Support de cours — PHYS301"
  author: "Antoine Boulet"
  date: today
  site-url: "https://antoineboulet.github.io/phys301-mecanique-quantique/book/"
  downloads: [pdf, epub]


  chapters:
    - index.qmd
    - chapters/01-postulats.qmd
    - chapters/02-systemes-simples.qmd
    - chapters/03-moment-cinetique.qmd
    - chapters/04-perturbations.qmd
    - chapters/references.qmd

bibliography: references.bib

format:
  html:
    toc: true

  pdf:
    documentclass: scrbook
    toc: true
    lof: false
    lot: false

  epub:
    toc: true

# Métadonnées partagées (auteur, affiliation, etc.) issues du submodule
metadata-files:
  - system/fragments/default-header.yml
  - system/fragments/default-theme.yml
  - system/fragments/default-book.yml
  - system/fragments/book-header.yml
  - system/fragments/book-theme.yml
  - system/fragments/book-website.yml
  - system/fragments/book-navbar-fr.yml
  - system/fragments/lang-fr.yml
